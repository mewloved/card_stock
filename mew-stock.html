<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEW STOCK — 주식 분석 공유</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1a2b4a;
  --navy-deep: #111d33;
  --navy-mid: #243559;
  --blue: #2557c7;
  --blue-soft: #e8eef8;
  --white: #ffffff;
  --off: #f7f9fc;
  --g100: #f0f2f7;
  --g200: #e2e6f0;
  --g400: #9ba5be;
  --g600: #5c6680;
  --text: #1a2035;
  --text-soft: #4a5470;
  --r: 18px;
  --r-sm: 12px;
  --sh: 0 4px 24px rgba(26,43,74,0.09);
  --sh-lg: 0 12px 40px rgba(26,43,74,0.14);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'DM Sans','Noto Sans KR',sans-serif; background: var(--off); color: var(--text); min-height: 100vh; }

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--g200);
  position: sticky; top: 0; z-index: 200;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark {
  width: 30px; height: 30px;
  background: var(--navy); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}
.logo-mark svg { width: 13px; height: 13px; fill: white; }
.logo-name {
  font-family: 'Playfair Display', serif;
  font-size: 17px; color: var(--navy); letter-spacing: 0.01em;
}
.logo-sub { font-size: 10px; color: var(--g400); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-top: -2px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.btn-settings {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid var(--g200); background: var(--white);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.btn-settings:hover { border-color: var(--navy); background: var(--g100); }
.btn-settings svg { width: 15px; height: 15px; stroke: var(--g600); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

/* ── MAIN ── */
main { max-width: 660px; margin: 0 auto; padding: 28px 20px 80px; }

/* ── ADD PANEL ── */
.add-panel {
  background: var(--white);
  border: 1px solid var(--g200);
  border-radius: var(--r);
  padding: 26px 26px 22px;
  box-shadow: var(--sh);
  margin-bottom: 28px;
}
.panel-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--blue);
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 18px;
}
.panel-label::after { content:''; flex:1; height:1px; background:var(--g200); }

.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 500; color: var(--g600); letter-spacing: 0.03em; margin-bottom: 5px; }
.field input, .field textarea {
  width: 100%; padding: 11px 15px;
  border: 1.5px solid var(--g200); border-radius: var(--r-sm);
  font-family: 'DM Sans','Noto Sans KR',sans-serif;
  font-size: 14px; color: var(--text);
  background: var(--off); outline: none;
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  resize: none;
}
.field input:focus, .field textarea:focus {
  border-color: var(--blue);
  box-shadow: 0 0 0 3px rgba(37,87,199,0.09);
  background: var(--white);
}
.field input::placeholder, .field textarea::placeholder { color: var(--g400); }

.btn-submit {
  width: 100%; padding: 13px;
  background: var(--navy); color: white; border: none;
  border-radius: var(--r-sm);
  font-family: 'DM Sans','Noto Sans KR',sans-serif;
  font-size: 14px; font-weight: 500; letter-spacing: 0.01em;
  cursor: pointer; transition: background 0.18s, transform 0.1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 4px;
}
.btn-submit:hover { background: var(--navy-mid); }
.btn-submit:active { transform: scale(0.99); }
.btn-submit:disabled { background: var(--g400); cursor: not-allowed; }

/* ── LIST ── */
.list-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.list-title { font-family: 'Playfair Display',serif; font-size: 19px; color: var(--navy); }
.count { background: var(--navy); color: white; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }

/* ── CARDS ── */
.card-list { display: flex; flex-direction: column; gap: 12px; }

.card {
  background: var(--white);
  border: 1px solid var(--g200);
  border-radius: var(--r);
  padding: 20px 22px 18px;
  box-shadow: var(--sh);
  position: relative; overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
  animation: fadeUp 0.3s ease both;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

.card::before {
  content:''; position: absolute; left:0; top:0; bottom:0; width:3px;
  background: var(--navy); opacity: 0;
  transition: opacity 0.2s;
  border-radius: 3px 0 0 3px;
}
.card:hover { box-shadow: var(--sh-lg); transform: translateY(-2px); }
.card:hover::before { opacity: 1; }

.card-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  background: var(--blue-soft); color: var(--blue);
  margin-bottom: 10px;
}
.card-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
.card-title { font-size: 15px; font-weight: 500; color: var(--navy); line-height: 1.45; flex:1; }
.card-arrow {
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--g100);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer; text-decoration: none;
  transition: background 0.18s;
}
.card-arrow:hover { background: var(--navy); }
.card-arrow:hover svg { stroke: white; }
.card-arrow svg { width: 12px; height: 12px; stroke: var(--navy); fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.18s; }

.card-desc { font-size: 13px; color: var(--text-soft); line-height: 1.65; margin-bottom: 14px; white-space: pre-wrap; }

.card-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px; border-top: 1px solid var(--g100);
}
.card-meta { display: flex; align-items: center; gap: 12px; }
.card-host { font-size: 11px; color: var(--g400); display: flex; align-items: center; gap: 4px; }
.card-host svg { width: 10px; height: 10px; stroke: var(--g400); fill: none; stroke-width: 2; }
.ttl-wrap { display: flex; align-items: center; gap: 6px; }
.ttl-bar { width: 44px; height: 3px; background: var(--g200); border-radius: 2px; overflow: hidden; }
.ttl-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.4s; }
.ttl-fill.warn { background: #d97706; }
.ttl-fill.danger { background: #dc2626; }
.ttl-label { font-size: 10px; color: var(--g400); white-space: nowrap; }

.card-actions { display: flex; align-items: center; gap: 6px; }
.btn-copy, .btn-del {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.18s, background 0.18s;
}
.card:hover .btn-copy, .card:hover .btn-del { opacity: 1; }
.btn-copy:hover { background: var(--blue-soft); }
.btn-del:hover { background: #fee2e2; }
.btn-copy svg { width: 12px; height: 12px; stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.btn-del svg { width: 12px; height: 12px; stroke: #dc2626; fill: none; stroke-width: 2; stroke-linecap: round; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 56px 24px; }
.empty-icon { width: 52px; height: 52px; background: var(--g100); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
.empty-icon svg { width: 22px; height: 22px; stroke: var(--g400); fill: none; stroke-width: 1.5; }
.empty p { font-size: 13px; color: var(--g400); line-height: 1.7; }

/* ── LOADING ── */
.loading { display: flex; justify-content: center; align-items: center; gap: 6px; padding: 48px; }
.loading span { width: 7px; height: 7px; background: var(--navy); border-radius: 50%; opacity: 0.25; animation: blink 1.2s ease-in-out infinite; }
.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,100%{opacity:0.25;transform:scale(1)} 50%{opacity:1;transform:scale(1.35)} }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--navy-deep); color: white;
  padding: 11px 22px; border-radius: 40px;
  font-size: 13px; font-weight: 400;
  opacity: 0; pointer-events: none; z-index: 999;
  transition: all 0.28s; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(17,29,51,0.28);
}
.toast.on { opacity:1; transform: translateX(-50%) translateY(0); }

/* ── SETTINGS MODAL ── */
.overlay {
  position: fixed; inset:0; background: rgba(17,29,51,0.45);
  z-index: 300; display: flex; align-items: flex-end; justify-content: center;
  opacity:0; pointer-events: none; transition: opacity 0.25s;
}
.overlay.on { opacity:1; pointer-events: all; }
.modal {
  background: var(--white); border-radius: 24px 24px 0 0;
  padding: 28px 26px 36px; width: 100%; max-width: 520px;
  transform: translateY(24px); transition: transform 0.28s;
}
.overlay.on .modal { transform: translateY(0); }
.modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
.modal-title { font-family: 'Playfair Display',serif; font-size: 18px; color: var(--navy); }
.btn-close { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--g200); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-close svg { width: 13px; height: 13px; stroke: var(--g600); fill: none; stroke-width: 2; stroke-linecap: round; }
.modal-field { margin-bottom: 14px; }
.modal-field label { display: block; font-size: 11px; font-weight: 500; color: var(--g600); letter-spacing: 0.03em; margin-bottom: 5px; }
.modal-field input {
  width: 100%; padding: 11px 15px;
  border: 1.5px solid var(--g200); border-radius: var(--r-sm);
  font-family: 'DM Sans','Noto Sans KR',sans-serif; font-size: 14px; color: var(--text);
  background: var(--off); outline: none; transition: border-color 0.18s, box-shadow 0.18s;
}
.modal-field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,87,199,0.09); background: var(--white); }
.modal-field input::placeholder { color: var(--g400); font-size: 13px; }
.btn-save {
  width: 100%; padding: 13px; background: var(--navy); color: white; border: none;
  border-radius: var(--r-sm); font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.18s; margin-top: 4px;
}
.btn-save:hover { background: var(--navy-mid); }
.modal-hint { font-size: 12px; color: var(--g400); margin-top: 14px; line-height: 1.6; }
.modal-hint a { color: var(--blue); text-decoration: none; }

@media (max-width: 480px) {
  header { padding: 0 16px; }
  main { padding: 22px 14px 80px; }
  .add-panel { padding: 20px 18px 18px; }
  .card { padding: 18px 18px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="4"/></svg>
    </div>
    <div>
      <span class="logo-name">MEW STOCK</span>
      <span class="logo-sub">Analysis Share</span>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-settings" onclick="openSettings()" title="설정">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>
</header>

<main>
  <!-- ADD -->
  <div class="add-panel">
    <div class="panel-label">새 분석 등록</div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="iTitle" placeholder="예) NVDA 실적 전 분석 — 2025.04" maxlength="80">
    </div>
    <div class="field">
      <label>분석 내용</label>
      <textarea id="iDesc" rows="4" placeholder="Gemini 분석 내용을 여기에 붙여넣으세요"></textarea>
    </div>
    <div class="field">
      <label>Gemini 원본 링크 (선택)</label>
      <input type="url" id="iUrl" placeholder="https://gemini.google.com/share/...">
    </div>
    <button class="btn-submit" id="btnAdd" onclick="addItem()">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg>
      분석 등록 및 공유 링크 생성
    </button>
  </div>

  <!-- LIST -->
  <div class="list-head">
    <span class="list-title">공유된 분석</span>
    <span class="count" id="count">0</span>
  </div>
  <div class="card-list" id="cardList"></div>
</main>

<div class="toast" id="toast"></div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="modal">
    <div class="modal-head">
      <span class="modal-title">설정</span>
      <button class="btn-close" onclick="closeSettings()">
        <svg viewBox="0 0 13 13"><line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/></svg>
      </button>
    </div>
    <div class="modal-field">
      <label>Worker URL</label>
      <input type="url" id="sWorker" placeholder="https://stock.mewloved.workers.dev">
    </div>
    <button class="btn-save" onclick="saveSettings()">저장</button>
    <p class="modal-hint">
      Worker URL은 Cloudflare 대시보드에서 확인할 수 있어요.<br>
      설정값은 이 기기에만 저장됩니다.
    </p>
  </div>
</div>

<script>
// ── CONFIG ──
const DEFAULT_WORKER = 'https://stock.mewloved.workers.dev';
const TTL_DAYS = 7;

function getWorker() {
  return localStorage.getItem('mew_worker') || DEFAULT_WORKER;
}

// ── STATE ──
let items = [];

// ── SETTINGS ──
function openSettings() {
  document.getElementById('sWorker').value = getWorker();
  document.getElementById('overlay').classList.add('on');
}
function closeSettings() {
  document.getElementById('overlay').classList.remove('on');
}
function onOverlayClick(e) {
  if (e.target === document.getElementById('overlay')) closeSettings();
}
function saveSettings() {
  const w = document.getElementById('sWorker').value.trim().replace(/\/$/, '');
  if (w) localStorage.setItem('mew_worker', w);
  closeSettings();
  showToast('설정이 저장되었습니다');
  fetchItems();
}

// ── API ──
async function fetchItems() {
  showLoading();
  try {
    const res = await fetch(`${getWorker()}/list`);
    items = await res.json();
    render();
  } catch (e) {
    document.getElementById('cardList').innerHTML = `
      <div class="empty">
        <div class="empty-icon"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
        <p>Worker 연결 실패.<br>설정에서 Worker URL을 확인해주세요.</p>
      </div>`;
    document.getElementById('count').textContent = '0';
  }
}

async function addItem() {
  const title = document.getElementById('iTitle').value.trim();
  const desc = document.getElementById('iDesc').value.trim();
  const url = document.getElementById('iUrl').value.trim();

  if (!title) { showToast('제목을 입력해주세요'); return; }
  if (!desc) { showToast('분석 내용을 입력해주세요'); return; }

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> 등록 중...`;

  try {
    const res = await fetch(`${getWorker()}/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, desc, url, tag: '미국주식' })
    });
    const data = await res.json();
    if (data.ok) {
      // 공유 링크 생성
      const shareUrl = `${getWorker()}/p?id=${data.id}`;
      await navigator.clipboard.writeText(shareUrl).catch(() => {});
      document.getElementById('iTitle').value = '';
      document.getElementById('iDesc').value = '';
      document.getElementById('iUrl').value = '';
      await fetchItems();
      showToast('✓ 등록 완료! 공유 링크가 복사되었습니다');
    } else {
      showToast('오류: ' + (data.error || '다시 시도해주세요'));
    }
  } catch (e) {
    showToast('연결 오류가 발생했어요');
  }

  btn.disabled = false;
  btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round"><line x1="6.5" y1="1" x2="6.5" y2="12"/><line x1="1" y1="6.5" x2="12" y2="6.5"/></svg> 분석 등록 및 공유 링크 생성`;
}

async function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  render();
  try {
    await fetch(`${getWorker()}/delete`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id })
    });
    showToast('삭제되었습니다');
  } catch (e) {
    showToast('삭제 중 오류가 발생했어요');
    fetchItems();
  }
}

async function copyLink(id) {
  const url = `${getWorker()}/p?id=${id}`;
  try {
    await navigator.clipboard.writeText(url);
    showToast('링크가 복사되었습니다');
  } catch (e) {
    showToast(url);
  }
}

// ── RENDER ──
function showLoading() {
  document.getElementById('cardList').innerHTML = `<div class="loading"><span></span><span></span><span></span></div>`;
}

function daysLeft(createdAt) {
  return Math.max(0, TTL_DAYS - (Date.now() - createdAt) / 86400000);
}

function render() {
  document.getElementById('count').textContent = items.length;
  if (!items.length) {
    document.getElementById('cardList').innerHTML = `
      <div class="empty">
        <div class="empty-icon"><svg viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round"><path d="M9 12h6M9 16h6M7 4H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-2"/><rect x="7" y="2" width="10" height="4" rx="1"/></svg></div>
        <p>아직 등록된 분석이 없어요.<br>위에서 첫 번째 분석을 등록해보세요.</p>
      </div>`;
    return;
  }

  document.getElementById('cardList').innerHTML = items.map((item, i) => {
    const left = daysLeft(item.createdAt);
    const pct = Math.round((left / TTL_DAYS) * 100);
    const fillCls = left < 2 ? 'danger' : left < 4 ? 'warn' : '';
    const dStr = left < 1 ? '오늘 만료' : left < 2 ? '내일 만료' : `${Math.floor(left)}일 남음`;
    let host = '';
    try { host = new URL(item.url || '').hostname; } catch {}

    return `<div class="card" style="animation-delay:${i * 0.05}s">
      <div class="card-tag">🇺🇸 미국주식</div>
      <div class="card-row">
        <div class="card-title">${esc(item.title)}</div>
        ${item.url ? `<a class="card-arrow" href="${esc(item.url)}" target="_blank" rel="noopener" title="원본 보기">
          <svg viewBox="0 0 12 12"><line x1="1" y1="11" x2="11" y2="1"/><polyline points="4 1 11 1 11 8"/></svg>
        </a>` : ''}
      </div>
      ${item.desc ? `<div class="card-desc">${esc(item.desc)}</div>` : ''}
      <div class="card-foot">
        <div class="card-meta">
          ${host ? `<span class="card-host"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>${esc(host)}</span>` : ''}
          <div class="ttl-wrap">
            <div class="ttl-bar"><div class="ttl-fill ${fillCls}" style="width:${pct}%"></div></div>
            <span class="ttl-label">${dStr}</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-copy" onclick="copyLink('${item.id}')" title="공유 링크 복사">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn-del" onclick="deleteItem('${item.id}')" title="삭제">
            <svg viewBox="0 0 13 13"><line x1="1" y1="1" x2="12" y2="12"/><line x1="12" y1="1" x2="1" y2="12"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── UTILS ──
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('on'), 2800);
}

// ── ENTER KEY ──
document.getElementById('iUrl').addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

// ── INIT ──
fetchItems();
</script>
</body>
</html>
